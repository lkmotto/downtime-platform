name: Daily Event Fetch

on: workflow_dispatch:

jobs:
  fetch-events:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run event fetcher
        env:
          TM_API_KEY: ${{ secrets.TM_API_KEY }}
          SG_CLIENT_ID: ${{ secrets.SG_CLIENT_ID }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          OTM_API_KEY: ${{ secrets.OTM_API_KEY }}
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: python scripts/fetch_all_cities.py

      - name: Upload fetch log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fetch-log-${{ github.run_number }}
          path: logs/
          retention-days: 7

  # Weekly job that includes Google Events (Sundays at 6 AM UTC)
  weekly-google-fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event.schedule == '0 6 * * 0' || (github.event_name == 'workflow_dispatch' && github.event.inputs.include_google == 'true')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run event fetcher with Google Events
        env:
          TM_API_KEY: ${{ secrets.TM_API_KEY }}
          SG_CLIENT_ID: ${{ secrets.SG_CLIENT_ID }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          OTM_API_KEY: ${{ secrets.OTM_API_KEY }}
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          INCLUDE_GOOGLE: 'true'
        run: python scripts/fetch_all_cities.py
